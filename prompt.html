<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>prompt</title>
</head>
<body>
    <script>
        let day; 
        // 값을 출력하려면 let입력(변수선언)
        day = prompt('오늘은 무슨 요일?');

        console.log(day);
        //콘솔에 값을 출력함

        //값을 입력-> 입력한 값 / 취소 ->
    </script>
</body>
</html>
